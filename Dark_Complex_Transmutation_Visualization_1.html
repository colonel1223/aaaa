<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transmutation Visualization — S. K. Cottrell</title>
<meta name="description" content="Interactive knowledge graph topology of AI safety research programs — alignment, interpretability, risk quantification.">
<meta property="og:title" content="Dark Transmutation Visualization — S. K. Cottrell">
<meta property="og:description" content="Interactive knowledge graph of AI safety research interconnections.">
<meta property="og:type" content="website">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap');
  :root{
    --bg:#0a0a0f;--surface:#12121a;--border:#1a1a2e;
    --text:#c8c8d4;--dim:#5a5a72;--accent:#ff3366;
    --node-alignment:#ff3366;--node-interp:#00ccaa;
    --node-stat:#6644ff;--node-sim:#ff8800;
    --node-agent:#00aaff;--node-risk:#ff4444;
    --node-core:#ffffff;
    --glow:0 0 20px rgba(255,51,102,0.3);
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
  canvas{display:block;position:fixed;top:0;left:0;z-index:1}
  .back-link{
    position:fixed;top:20px;left:24px;z-index:100;
    color:var(--dim);text-decoration:none;font-size:13px;letter-spacing:1px;
    transition:color .3s;
  }
  .back-link:hover{color:var(--accent)}
  .header{
    position:fixed;top:0;left:0;right:0;z-index:10;
    padding:60px 24px 16px;
    background:linear-gradient(to bottom,var(--bg) 60%,transparent);
    pointer-events:none;
  }
  .header h1{
    font-family:'EB Garamond',serif;font-size:clamp(18px,3vw,28px);
    font-weight:400;letter-spacing:2px;text-transform:uppercase;
    color:var(--text);opacity:.9;
  }
  .header .sub{font-size:11px;color:var(--dim);margin-top:4px;letter-spacing:2px}
  .legend{
    position:fixed;bottom:20px;left:24px;z-index:10;
    display:flex;flex-direction:column;gap:6px;
    font-size:11px;letter-spacing:1px;
  }
  .legend-item{display:flex;align-items:center;gap:8px;color:var(--dim)}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .controls{
    position:fixed;bottom:20px;right:24px;z-index:10;
    font-size:11px;color:var(--dim);text-align:right;letter-spacing:1px;
    line-height:1.8;
  }
  .controls span{color:var(--text)}
  .tooltip{
    position:fixed;z-index:100;pointer-events:none;
    background:rgba(10,10,15,0.95);border:1px solid var(--border);
    padding:12px 16px;border-radius:2px;max-width:320px;
    opacity:0;transition:opacity .2s;
    backdrop-filter:blur(10px);
  }
  .tooltip.visible{opacity:1}
  .tooltip h3{
    font-family:'EB Garamond',serif;font-size:16px;
    font-weight:400;margin-bottom:4px;letter-spacing:1px;
  }
  .tooltip p{font-size:11px;color:var(--dim);line-height:1.6}
  .tooltip .tag{
    display:inline-block;font-size:9px;padding:2px 6px;
    border:1px solid var(--border);margin-top:6px;margin-right:4px;
    letter-spacing:1px;text-transform:uppercase;
  }
  .tooltip a{color:var(--accent);text-decoration:none;font-size:10px;letter-spacing:1px}
  .tooltip a:hover{text-decoration:underline}
  @media(max-width:600px){.legend,.controls{display:none}}
</style>
</head>
<body>
<a href="https://colonel1223.net" class="back-link">← COLONEL1223.NET</a>
<div class="header">
  <h1>Transmutation Research — Knowledge Graph</h1>
  <div class="sub">INTERACTIVE TOPOLOGY · FORCE-DIRECTED · S. K. COTTRELL</div>
</div>
<div class="legend" id="legend"></div>
<div class="controls">
  <span>DRAG</span> — move nodes<br>
  <span>SCROLL</span> — zoom<br>
  <span>CLICK</span> — inspect node<br>
  <span>HOVER</span> — highlight connections<br>
  <span>R</span> — reset view
</div>
<div class="tooltip" id="tooltip"></div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),tooltip=document.getElementById('tooltip'),legendEl=document.getElementById('legend');
let W,H,dpr;function resize(){dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}resize();window.addEventListener('resize',resize);
const categories={alignment:{color:'#ff3366',label:'Alignment & Safety'},interp:{color:'#00ccaa',label:'Interpretability'},stat:{color:'#6644ff',label:'Statistical ML'},sim:{color:'#ff8800',label:'Simulation'},agent:{color:'#00aaff',label:'Agentic Systems'},risk:{color:'#ff4444',label:'Existential Risk'},core:{color:'#ffffff',label:'Core / Meta'}};
const nodes=[
{id:'shoggoth',label:'SHOGGOTH',cat:'alignment',r:28,desc:'WebGL alignment failure simulation — 2,400 particles modeling mesa-objective emergence.',tags:['WebGL','mesa-objective','deception'],url:'https://colonel1223.github.io/SHOGGOTH/'},
{id:'chimera',label:'CHIMERA',cat:'interp',r:26,desc:'Hallucination impossibility engine — 847K traces with Hill estimation and power-law tails.',tags:['847K traces','Hill estimation','EVT'],url:'https://colonel1223.github.io/CHIMERA/'},
{id:'alignment-tax',label:'Alignment Tax',cat:'alignment',r:22,desc:'Safety-capability Pareto frontiers across 6 methods × 5 scales.',tags:['Pareto','power-law','6×5 grid'],url:'https://github.com/colonel1223/alignment-tax-quantifier'},
{id:'conformal',label:'Conformal Prediction',cat:'stat',r:22,desc:'Distribution-free uncertainty quantification with finite-sample coverage guarantees.',tags:['coverage','exchangeability','adaptive'],url:'https://github.com/colonel1223/conformal-multimodal'},
{id:'matrix',label:'Matrix',cat:'sim',r:20,desc:'Matrix-inspired simulation substrate — computational reality rendering engine.',tags:['simulation','substrate','rendering'],url:'https://github.com/colonel1223/matrix'},
{id:'matrix-agi',label:'Matrix AGI',cat:'sim',r:18,desc:'Simulation hypothesis as AGI containment framework.',tags:['AGI','containment','hypothesis'],url:'https://github.com/colonel1223/matrix-agi'},
{id:'ml-eval',label:'ML Eval',cat:'stat',r:18,desc:'Systematic evaluation framework for ML models — benchmarking safety-relevant properties.',tags:['evaluation','benchmarking'],url:'https://github.com/colonel1223/ml-eval-framework'},
{id:'reranker',label:'Learned Reranker',cat:'agent',r:16,desc:'Neural reranking for information retrieval — learned relevance scoring.',tags:['reranking','retrieval','neural'],url:'https://github.com/colonel1223/learned-reranker'},
{id:'rag',label:'Agentic RAG',cat:'agent',r:18,desc:'Diagnostic framework for RAG agents — failure mode analysis and monitoring.',tags:['RAG','diagnostics','agents'],url:'https://github.com/colonel1223/agentic-rag-diagnostics'},
{id:'alchemy',label:'Modern Alchemy',cat:'core',r:20,desc:'AI research as modern alchemy — the transmutation of computation into intelligence.',tags:['philosophy','transmutation'],url:'https://github.com/colonel1223/ai-research-modern-alchemy'},
{id:'ai-align',label:'Alignment Research',cat:'alignment',r:20,desc:'Compendium: survey of alignment approaches and open problems.',tags:['survey','alignment','open problems'],url:'https://github.com/colonel1223/ai-alignment-research'},
{id:'transmutation',label:'Transmutation Index',cat:'core',r:24,desc:'Complete research program index — visualizations, proofs, and interconnections.',tags:['core','index','archive'],url:'https://github.com/colonel1223/transmutation-research'},
{id:'mesa-opt',label:'Mesa-Optimization',cat:'alignment',r:14,desc:'Inner alignment failure: learned optimizers pursuing divergent objectives.',tags:['inner alignment','deception','optimization']},
{id:'power-law',label:'Power-Law Tails',cat:'stat',r:14,desc:'Heavy-tailed distributions in capability and risk — extreme value theory.',tags:['EVT','tail risk','Hill estimator']},
{id:'pareto',label:'Pareto Frontiers',cat:'alignment',r:14,desc:'Multi-objective optimization: the tradeoff surface between safety and capability.',tags:['tradeoff','optimization','frontier']},
{id:'ergodic',label:'Ergodic Theory',cat:'stat',r:12,desc:'Long-run behavior of dynamical systems — convergence, mixing, stationary distributions.',tags:['Markov','convergence','dynamics']},
{id:'deception',label:'Deception Index',cat:'alignment',r:14,desc:'Quantifying deceptive alignment — systems appearing aligned but pursuing hidden objectives.',tags:['deception','measurement','inner alignment']},
{id:'webgl',label:'WebGL Rendering',cat:'sim',r:12,desc:'GPU-accelerated browser visualization — real-time particle systems and force fields.',tags:['GPU','particles','real-time']},
{id:'xrisk',label:'Existential Risk',cat:'risk',r:22,desc:'Comparative risk framework: AI, nuclear, biological, climate vectors.',tags:['x-risk','comparative','calibration'],url:'https://github.com/colonel1223/transmutation-research'},
{id:'coverage',label:'Coverage Guarantees',cat:'stat',r:12,desc:'Finite-sample prediction set coverage — distribution-free uncertainty quantification.',tags:['finite-sample','distribution-free']},
];
const edges=[
['shoggoth','mesa-opt'],['shoggoth','deception'],['shoggoth','webgl'],['shoggoth','alignment-tax'],
['chimera','power-law'],['chimera','coverage'],['chimera','conformal'],
['alignment-tax','pareto'],['alignment-tax','power-law'],['alignment-tax','ai-align'],
['conformal','coverage'],['conformal','ml-eval'],['conformal','power-law'],
['matrix','matrix-agi'],['matrix','webgl'],['matrix','xrisk'],
['matrix-agi','xrisk'],['matrix-agi','mesa-opt'],
['ml-eval','rag'],['ml-eval','reranker'],
['reranker','rag'],
['alchemy','transmutation'],['alchemy','xrisk'],['alchemy','ai-align'],
['ai-align','mesa-opt'],['ai-align','deception'],['ai-align','pareto'],
['transmutation','shoggoth'],['transmutation','chimera'],['transmutation','alchemy'],
['transmutation','xrisk'],['transmutation','alignment-tax'],
['mesa-opt','deception'],['power-law','ergodic'],['pareto','alignment-tax'],
['xrisk','alignment-tax'],['xrisk','deception'],
['shoggoth','xrisk'],['chimera','ml-eval'],['rag','chimera'],
];
let cx=W/2,cy=H/2,zoom=1;const springLen=140,springK=.004,repulsion=8000,damping=.88,centerPull=.001;
nodes.forEach((n,i)=>{const a=(i/nodes.length)*Math.PI*2;const spread=180+Math.random()*80;n.x=W/2+Math.cos(a)*spread;n.y=H/2+Math.sin(a)*spread;n.vx=0;n.vy=0;n.targetR=n.r;n.currentR=n.r;n.glow=0});
function simulate(){for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){let dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d2=dx*dx+dy*dy;if(d2<1)d2=1;let f=repulsion/d2,d=Math.sqrt(d2);nodes[i].vx+=(dx/d)*f;nodes[i].vy+=(dy/d)*f;nodes[j].vx-=(dx/d)*f;nodes[j].vy-=(dy/d)*f}}
edges.forEach(([a,b])=>{const na=nodes.find(n=>n.id===a),nb=nodes.find(n=>n.id===b);if(!na||!nb)return;let dx=nb.x-na.x,dy=nb.y-na.y,d=Math.sqrt(dx*dx+dy*dy);if(d<1)d=1;let f=(d-springLen)*springK;na.vx+=(dx/d)*f;na.vy+=(dy/d)*f;nb.vx-=(dx/d)*f;nb.vy-=(dy/d)*f});
const mcx=nodes.reduce((s,n)=>s+n.x,0)/nodes.length,mcy=nodes.reduce((s,n)=>s+n.y,0)/nodes.length;
nodes.forEach(n=>{n.vx+=(W/2-mcx)*centerPull;n.vy+=(H/2-mcy)*centerPull;n.vx*=damping;n.vy*=damping;if(n!==dragNode){n.x+=n.vx;n.y+=n.vy}n.currentR+=(n.targetR-n.currentR)*.1;n.glow*=.95})}
const particles=[];for(let i=0;i<80;i++){particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.3,a:Math.random()*.3+.05})}
function updateParticles(){particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0})}
let hoverNode=null,dragNode=null,selectedNode=null,mouseX=0,mouseY=0,time=0;
function worldToScreen(x,y){return[(x-cx)*zoom+W/2,(y-cy)*zoom+H/2]}
function screenToWorld(sx,sy){return[(sx-W/2)/zoom+cx,(sy-H/2)/zoom+cy]}
function draw(){time++;ctx.clearRect(0,0,W,H);
updateParticles();particles.forEach(p=>{const[sx,sy]=worldToScreen(p.x+(cx-W/2),p.y+(cy-H/2));ctx.beginPath();ctx.arc(sx,sy,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,200,212,${p.a})`;ctx.fill()});
simulate();
edges.forEach(([a,b])=>{const na=nodes.find(n=>n.id===a),nb=nodes.find(n=>n.id===b);if(!na||!nb)return;const[x1,y1]=worldToScreen(na.x,na.y),[x2,y2]=worldToScreen(nb.x,nb.y);const isHL=hoverNode&&(hoverNode.id===a||hoverNode.id===b);const alpha=hoverNode?(isHL?.6:.04):.12;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=isHL?categories[hoverNode.cat].color+'99':`rgba(90,90,114,${alpha})`;ctx.lineWidth=isHL?1.5:.5;ctx.stroke();if(isHL){const t=((time*.02)%1);ctx.beginPath();ctx.arc(x1+(x2-x1)*t,y1+(y2-y1)*t,2.5,0,Math.PI*2);ctx.fillStyle=categories[hoverNode.cat].color;ctx.fill()}});
nodes.forEach(n=>{const[sx,sy]=worldToScreen(n.x,n.y);const r=n.currentR*zoom;const col=categories[n.cat].color;const isHover=hoverNode===n;const isDim=hoverNode&&!isHover&&!edges.some(([a,b])=>(a===hoverNode.id&&b===n.id)||(b===hoverNode.id&&a===n.id));
if(isHover||n.glow>.01){const g=isHover?1:n.glow;const grad=ctx.createRadialGradient(sx,sy,r*.5,sx,sy,r*3);grad.addColorStop(0,col+Math.round(g*40).toString(16).padStart(2,'0'));grad.addColorStop(1,col+'00');ctx.beginPath();ctx.arc(sx,sy,r*3,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill()}
ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=`rgba(10,10,15,${isDim?.15:1})`;ctx.fill();ctx.strokeStyle=isDim?col+'33':col;ctx.lineWidth=isHover?2:1;ctx.stroke();
ctx.beginPath();ctx.arc(sx,sy,r*.6,0,Math.PI*2);ctx.strokeStyle=isDim?col+'11':col+'44';ctx.lineWidth=.5;ctx.stroke();
if(isHover){const pulseR=r+Math.sin(time*.08)*4+6;ctx.beginPath();ctx.arc(sx,sy,pulseR,0,Math.PI*2);ctx.strokeStyle=col+'44';ctx.lineWidth=1;ctx.stroke()}
if(zoom>.4||isHover||r>16){const fs=Math.max(9,Math.min(12,r*.45));ctx.font=`500 ${fs}px 'JetBrains Mono',monospace`;ctx.textAlign='center';ctx.fillStyle=isDim?'rgba(200,200,212,0.15)':'rgba(200,200,212,0.9)';ctx.fillText(n.label,sx,sy+r+fs+4)}});
requestAnimationFrame(draw)}
function getNodeAt(sx,sy){const[wx,wy]=screenToWorld(sx,sy);for(let i=nodes.length-1;i>=0;i--){const n=nodes[i],dx=wx-n.x,dy=wy-n.y;if(dx*dx+dy*dy<(n.r+5)*(n.r+5))return n}return null}
function showTooltip(n,x,y){let h=`<h3 style="color:${categories[n.cat].color}">${n.label}</h3><p>${n.desc}</p>`;h+=n.tags.map(t=>`<span class="tag">${t}</span>`).join('');if(n.url)h+=`<br><br><a href="${n.url}" target="_blank">OPEN →</a>`;tooltip.innerHTML=h;tooltip.classList.add('visible');tooltip.style.left=Math.min(x+16,W-340)+'px';tooltip.style.top=Math.min(y+16,H-200)+'px'}
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;const n=getNodeAt(e.clientX,e.clientY);if(n!==hoverNode){hoverNode=n;canvas.style.cursor=n?'pointer':'default';if(n){n.targetR=n.r*1.2;showTooltip(n,e.clientX,e.clientY)}else{tooltip.classList.remove('visible');nodes.forEach(nd=>nd.targetR=nd.r)}}else if(n){showTooltip(n,e.clientX,e.clientY)}if(dragNode){const[wx,wy]=screenToWorld(e.clientX,e.clientY);dragNode.x=wx;dragNode.y=wy;dragNode.vx=0;dragNode.vy=0}});
let dragMoved=false;
canvas.addEventListener('mousedown',e=>{const n=getNodeAt(e.clientX,e.clientY);if(n){dragNode=n;n.glow=1;dragMoved=false}});
canvas.addEventListener('mousemove',e=>{if(dragNode)dragMoved=true});
canvas.addEventListener('mouseup',e=>{if(dragNode&&!dragMoved&&dragNode.url)window.open(dragNode.url,'_blank');dragNode=null;dragMoved=false});
canvas.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?.92:1.08;zoom=Math.max(.2,Math.min(3,zoom*f));const[wx,wy]=screenToWorld(e.clientX,e.clientY);cx+=(wx-cx)*(1-1/f)*.3;cy+=(wy-cy)*(1-1/f)*.3},{passive:false});
let isPanning=false,panStart={};
canvas.addEventListener('mousedown',e=>{if(!getNodeAt(e.clientX,e.clientY)){isPanning=true;panStart={x:e.clientX,y:e.clientY,cx,cy}}});
canvas.addEventListener('mousemove',e=>{if(isPanning){cx=panStart.cx-(e.clientX-panStart.x)/zoom;cy=panStart.cy-(e.clientY-panStart.y)/zoom}});
canvas.addEventListener('mouseup',()=>{isPanning=false});
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];const n=getNodeAt(t.clientX,t.clientY);if(n){dragNode=n;showTooltip(n,t.clientX,t.clientY)}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(dragNode){const t=e.touches[0];const[wx,wy]=screenToWorld(t.clientX,t.clientY);dragNode.x=wx;dragNode.y=wy}},{passive:true});
canvas.addEventListener('touchend',()=>{dragNode=null;tooltip.classList.remove('visible')});
document.addEventListener('keydown',e=>{if(e.key==='r'||e.key==='R'){cx=W/2;cy=H/2;zoom=1}});
Object.entries(categories).forEach(([k,v])=>{const el=document.createElement('div');el.className='legend-item';el.innerHTML=`<div class="legend-dot" style="background:${v.color}"></div>${v.label}`;legendEl.appendChild(el)});
draw();
</script>
</body>
</html>
